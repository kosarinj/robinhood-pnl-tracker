[build]
builder = "nixpacks"
buildCommand = "npm install --legacy-peer-deps && npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# SQLite lives on a single persistent volume, which can only attach to ONE container.
# Pin to a single replica so extra replicas never run on an empty (volume-less) DB, and
# disable deploy overlap so the old container fully releases the volume before the new one
# starts — otherwise the new container briefly serves an empty database mid-deploy.
numReplicas = 1
overlapSeconds = 0

# NOTE: The persistent volume (robinhood-pnl-tracker-volume) is attached via the Railway
# DASHBOARD at mount path /data. Do NOT declare a config-as-code volume here — a second
# volume block at a different mountPath conflicts with the dashboard volume so neither
# mounts, leaving the app on ephemeral disk. The app auto-detects /data (see resolveDbPath).

[deploy.environmentVariables]
DATABASE_PATH = "/data/trading_data.db"
NODE_ENV = "production"
PUPPETEER_SKIP_DOWNLOAD = "true"
